<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Heartstrings Studio</title>
<meta name="description" content="Your story has been sent. Tim will be in contact with you within 24 hours.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#160f11">

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --charcoal:      #1a1416;
  --cream:         #faf6f2;
  --rose:          #c0455a;
  --rose-light:    #d4637a;
  --rose-deep:     #8b2a3a;
  --gold:          #b8956a;
  --serif:         'Cormorant Garamond', Georgia, serif;
  --sans:          'Lato', system-ui, sans-serif;
  --ease-out:      cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);
  --ease-elegant:  cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-rose:   0 14px 40px rgba(192,69,90,0.14);
}

html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: #160f11;
  color: var(--cream);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 48px 24px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 50% 28%, rgba(192,69,90,0.28) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 30% 70%, rgba(139,42,58,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 35% 25% at 80% 80%, rgba(184,149,106,0.08) 0%, transparent 70%);
  animation: heroBreath 10s var(--ease-in-out) infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes heroBreath {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.82; transform: scale(1.04); }
}

.thanks-content {
  position: relative;
  z-index: 1;
  max-width: 620px;
  margin: 0 auto;
  animation: fadeUp 1s var(--ease-elegant) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.thanks-label {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--rose-light);
  margin-bottom: 22px;
}

.thanks-content h1 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: clamp(2.4rem, 6vw, 3.6rem);
  line-height: 1.15;
  letter-spacing: 0.01em;
  margin-bottom: 26px;
}
.thanks-content h1 em { font-style: italic; font-weight: 600; color: var(--rose-light); }

.thanks-content p {
  font-size: 1.05rem;
  line-height: 1.85;
  color: rgba(250,246,242,0.82);
  margin: 0 auto 1.2em;
  max-width: 520px;
}

.thanks-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 34px auto;
}
.thanks-divider .line {
  width: 70px;
  height: 1px;
  background: rgba(212,99,122,0.45);
}
.thanks-divider .diamond {
  width: 7px;
  height: 7px;
  border: 1px solid var(--rose-light);
  transform: rotate(45deg);
}

.btn-ornate {
  display: inline-block;
  position: relative;
  background: transparent;
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-decoration: none;
  padding: 16px 52px;
  border: 1px solid currentColor;
  cursor: pointer;
  transition: color 0.4s var(--ease-out), transform 0.3s var(--ease-out), box-shadow 0.4s var(--ease-out);
  text-align: center;
  overflow: hidden;
  isolation: isolate;
  z-index: 0;
}
.btn-ornate::before, .btn-ornate::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-style: solid;
  border-color: currentColor;
  opacity: 0.55;
  transition: opacity 0.4s var(--ease-out), width 0.4s var(--ease-out), height 0.4s var(--ease-out);
  z-index: 2;
}
.btn-ornate::before { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
.btn-ornate::after  { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }
.btn-ornate > span { position: relative; z-index: 3; display: inline-block; transition: color 0.4s var(--ease-out); }
.btn-ornate .btn-sweep {
  position: absolute;
  inset: 0;
  background: currentColor;
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.5s var(--ease-elegant);
  z-index: 1;
  opacity: 0.12;
}
.btn-ornate:hover { transform: translateY(-1px); }
.btn-ornate:hover::before, .btn-ornate:hover::after { opacity: 1; width: 14px; height: 14px; }
.btn-ornate:hover .btn-sweep { transform: scaleX(1); }
.btn-dark { color: #f4e0e4; border-color: rgba(212,99,122,0.55); }
.btn-dark:hover { box-shadow: var(--shadow-rose); border-color: rgba(212,99,122,0.85); }

.thanks-logo {
  width: 84px;
  height: auto;
  margin: 0 auto 26px;
  display: block;
  opacity: 0.95;
}

@media (prefers-reduced-motion: reduce) {
  body::before { animation: none; }
  .thanks-content { animation: none; }
}
</style>
</head>
<body>

<div class="thanks-content">
  <img src="logo.png" alt="Heartstrings Studio" class="thanks-logo">
  <div class="thanks-label">Heartstrings Studio</div>
  <h1>Your story has been <em>received</em></h1>
  <p>Thank you for sharing your story. Your response has been sent and received, and Tim will be in contact with you within 24 hours to talk through your song.</p>
  <div class="thanks-divider" aria-hidden="true">
    <span class="line"></span><span class="diamond"></span><span class="line"></span>
  </div>
  <a href="index.html" class="btn-ornate btn-dark">
    <span class="btn-sweep"></span><span>&larr; Back to Heartstrings Studio</span>
  </a>
</div>

</body>
</html>
